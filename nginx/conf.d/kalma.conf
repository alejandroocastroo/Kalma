# ─────────────────────────────────────────
# Kalma – Nginx config
# Cloudflare Tunnel apunta a este Nginx
# ─────────────────────────────────────────

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── API (api.usekalma.com) ─────────────────
server {
    listen 80;
    server_name api.usekalma.com localhost;

    location /health {
        proxy_pass http://backend/health;
    }

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── App principal y landing pages ──────────
# usekalma.com, app.usekalma.com, *.usekalma.com
server {
    listen 80 default_server;
    server_name _;

    # Extraer tenant slug del subdominio y pasarlo al backend/frontend
    # mantra.usekalma.com → X-Tenant-Slug: mantra
    set $tenant_slug "";
    if ($host ~* "^([^.]+)\.usekalma\.com$") {
        set $tenant_slug $1;
    }

    # Bloquear rutas de bots/scanners comunes
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* /(wp-login|xmlrpc|phpmyadmin|admin/config|\.env|\.git) { return 444; }

    # Next.js internal API routes (session cookie, etc.) → frontend
    location /api/auth/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API calls van al backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }

    # Todo lo demás va al frontend
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Slug $tenant_slug;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
