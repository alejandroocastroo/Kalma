services:
  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kalma_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kalma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalmapassword}
      POSTGRES_DB: ${POSTGRES_DB:-kalma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalma} -d ${POSTGRES_DB:-kalma}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kalma_net

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kalma_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-kalmaRedis123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-kalmaRedis123} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kalma_net

  # ─────────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kalma_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kalma}:${POSTGRES_PASSWORD:-kalmapassword}@db:5432/${POSTGRES_DB:-kalma}
      REDIS_URL: redis://:${REDIS_PASSWORD:-kalmaRedis123}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production-min-32-chars}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
      POSTGRES_USER: ${POSTGRES_USER:-kalma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalmapassword}
      POSTGRES_DB: ${POSTGRES_DB:-kalma}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - kalma_net
    command: bash init.sh

  # ─────────────────────────────────────────
  # Frontend (Next.js)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kalma_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    networks:
      - kalma_net

  # ─────────────────────────────────────────
  # Nginx (reverse proxy)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kalma_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - kalma_net

volumes:
  postgres_data:
  redis_data:

networks:
  kalma_net:
    driver: bridge
